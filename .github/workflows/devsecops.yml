name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  slither-audit:
    name: Slither Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Slither + solc
        run: |
          pip install slither-analyzer solc-select
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

      - name: Run Slither on VulnerableToken
        working-directory: smart-contracts
        run: |
          slither src/VulnerableToken.sol --json vuln_report.json || true

      - name: Run Slither on SecureToken
        working-directory: smart-contracts
        run: |
          slither src/SecureToken.sol --json secure_report.json || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: slither-reports
          path: smart-contracts/*.json


  foundry-tests:
    name: Foundry Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          ~/.foundry/bin/foundryup

      - name: Run tests
        working-directory: smart-contracts
        run: |
