name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  slither-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither + solc
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer solc-select
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Install Foundry Toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contracts
        working-directory: smart-contracts
        run: forge build

      - name: Run Slither Security Analysis
        working-directory: smart-contracts
        run: |
          slither . --json slither-report.json || true

      - name: Upload Slither reports
        uses: actions/upload-artifact@v4
        with:
          name: slither-reports
          path: smart-contracts/slither-report.json

  foundry-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry Toolchain
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Run Forge Tests & Fuzzing
        working-directory: smart-contracts
        run: forge test -vv
